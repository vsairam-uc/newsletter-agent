<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}System Design & AI Research Newsletter{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f3f4f6;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text-secondary: #9ca3af;
            --header-bg: rgba(11, 15, 25, 0.8);
            --button-bg: #1e293b;
            --button-hover: #334155;
            --border-radius: 16px;
            --font-primary: 'Outfit', sans-serif;
            --font-secondary: 'Plus Jakarta Sans', sans-serif;
            --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 0, 0, 0.06);
            --accent-primary: #2563eb;
            --accent-secondary: #7c3aed;
            --accent-glow: rgba(37, 99, 235, 0.08);
            --text-secondary: #475569;
            --header-bg: rgba(248, 250, 252, 0.8);
            --button-bg: #e2e8f0;
            --button-hover: #cbd5e1;
            --shadow-glow: 0 4px 20px rgba(37, 99, 235, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Ambient Glow Background elements */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            left: -200px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            position: sticky;
            top: 0;
            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: var(--font-secondary);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            font-size: 1.25rem;
            background: var(--text-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: var(--text-color);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .theme-toggle-btn {
            background-color: var(--button-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .theme-toggle-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
            cursor: pointer;
            padding: 0.6rem 1.2rem;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-glow);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.35);
        }

        .main-content {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
        }

        footer {
            border-top: 1px solid var(--card-border);
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* Glassmorphic Container */
        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Responsive Utilities */
        @media (max-width: 768px) {
            .nav-container {
                padding: 1rem;
            }
            .main-content {
                padding: 2rem 1rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                🧠 Systems & AI <span>Digest</span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span> <span id="theme-text">Dark</span>
                </button>
                <button class="btn-primary" id="trigger-curation-btn">
                    <span>⚡</span> Trigger Run
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Systems & AI Research Digest. Built with ADK 2.0 & FastAPI.</p>
    </footer>

    <script>
        // Init theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (theme === 'dark') {
                icon.textContent = '🌙';
                text.textContent = 'Dark';
            } else {
                icon.textContent = '☀️';
                text.textContent = 'Light';
            }
        }

        // Trigger Run Button Handler
        document.getElementById('trigger-curation-btn').addEventListener('click', async () => {
            const btn = document.getElementById('trigger-curation-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Curating...';
            btn.style.opacity = '0.7';

            try {
                const response = await fetch('/api/trigger', { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    if (data.status === "skipped") {
                        alert('Curation complete: No new relevant papers found at this time.');
                    } else {
                        alert('Newsletter successfully curated and dispatched!\nTitle: ' + data.title);
                    }
                    window.location.reload();
                } else {
                    alert('Error running curation: ' + (data.detail || data.error));
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
